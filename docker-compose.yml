services:
  onlyoffice-mysql-server:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
      - --sql-mode=NO_ENGINE_SUBSTITUTION
      - --max-connections=1000
      - --max-allowed-packet=1073741824
      - --group-concat-max-len=2048
    networks:
      - onlyoffice
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  onlyoffice-elasticsearch:
    image: onlyoffice/elasticsearch:7.16.3
    restart: always
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: -Xms1g -Xmx1g -Dlog4j2.formatMsgNoLookups=true
      ingest.geoip.downloader.enabled: "false"
    networks:
      - onlyoffice
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - es_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
      - "9300"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  onlyoffice-document-server:
    image: onlyoffice/documentserver:8.1
    restart: always
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_HEADER: AuthorizationJwt
      TZ: ${TZ}
    networks:
      - onlyoffice
    expose:
      - "80"
    volumes:
      - document_data:/var/www/onlyoffice/Data
      - document_log:/var/log/onlyoffice
      - document_forgotten:/var/lib/onlyoffice/documentserver/App_Data/cache/files/forgotten

  onlyoffice-community-server:
    image: onlyoffice/communityserver:12.6.0.1900
    restart: always
    privileged: true
    cgroup: host
    depends_on:
      onlyoffice-mysql-server:
        condition: service_healthy
      onlyoffice-elasticsearch:
        condition: service_healthy
      onlyoffice-document-server:
        condition: service_started
    environment:
      ONLYOFFICE_CORE_MACHINEKEY: ${CORE_MACHINE_KEY}

      DOCUMENT_SERVER_PORT_80_TCP_ADDR: onlyoffice-document-server
      DOCUMENT_SERVER_JWT_ENABLED: "true"
      DOCUMENT_SERVER_JWT_SECRET: ${JWT_SECRET}
      DOCUMENT_SERVER_JWT_HEADER: AuthorizationJwt

      MYSQL_SERVER_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_SERVER_DB_NAME: ${MYSQL_DATABASE}
      MYSQL_SERVER_HOST: onlyoffice-mysql-server
      MYSQL_SERVER_USER: ${MYSQL_USER}
      MYSQL_SERVER_PASS: ${MYSQL_PASSWORD}

      ELASTICSEARCH_SERVER_HOST: onlyoffice-elasticsearch
      ELASTICSEARCH_SERVER_HTTPPORT: "9200"

      TZ: ${TZ}
    networks:
      onlyoffice:
        aliases:
          # Required when running behind EasyPanel.
          # EasyPanel's Traefik generates the backend hostname using
          # <project>_<service>.
          - sistemas_onlyoffice-server-work_onlyoffice-community-server
    expose:
      - "80"
      - "5222"
    volumes:
      - community_data:/var/www/onlyoffice/Data
      - community_log:/var/log/onlyoffice
      - community_letsencrypt:/etc/letsencrypt
      - document_data:/var/www/onlyoffice/DocumentServerData
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

networks:
  onlyoffice:
    driver: bridge

volumes:
  document_data:
  document_log:
  document_forgotten:
  community_data:
  community_log:
  community_letsencrypt:
  mysql_data:
  es_data:
